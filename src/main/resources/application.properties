# =============================================
# SIENEP — Configuración Integrada (E1+E2+E3)
# =============================================

# Servidor
server.port=8080

# Base de Datos PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sienep}
spring.datasource.username=${DB_USER:proyecto}
spring.datasource.password=${DB_PASSWORD:proyecto2025}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — OBLIGATORIO: ddl-auto=validate (consigna)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:c2llbmVwLXV0ZWMtMjAyNi1zZWNyZXQta2V5LXN1cGVyLXNlZ3VyYS1wYXJhLWpzb24td2ViLXRva2Vu}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# RNF12 – Notificaciones externas por correo
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:sienep@utec.edu.uy}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# En desarrollo: deshabilitar envío real
sienep.notificaciones.habilitadas=${NOTIF_HABILITADAS:false}
sienep.notificaciones.email-remitente=${MAIL_USER:sienep@utec.edu.uy}

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging — nunca loguear credenciales ni datos sensibles
logging.level.com.utec.sienep=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.mail=INFO
