# =============================================
# SIENEP - Configuración de la Aplicación
# =============================================

# Servidor
server.port=8080

# Base de Datos PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sienep}
spring.datasource.username=${DB_USER:proyecto}
spring.datasource.password=${DB_PASSWORD:proyecto2025}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Springdoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.com.utec.sienep=DEBUG
logging.level.org.hibernate.SQL=DEBUG
